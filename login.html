<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Urban Threads</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >
</head>
<body>

  <!-- ── Navbar ───────────────────────────────────────────────────────── -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Urban<span>Threads</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li>
          <a href="cart.html" class="nav-cart-link">
            Cart <span class="cart-badge" id="cart-count" aria-label="Cart items" style="display:none">0</span>
          </a>
        </li>
      </ul>
      <div class="nav-auth">
        <span id="user-display"></span>
        <a href="login.html" class="btn btn-outline" id="login-nav-btn">Login</a>
        <button class="btn btn-ghost" id="logout-btn" style="display:none">Logout</button>
      </div>
    </div>
  </nav>

  <!-- ── Auth card ──────────────────────────────────────────────────────── -->
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">Urban<span>Threads</span></div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Login</button>
        <button class="auth-tab"        id="tab-signup">Sign Up</button>
      </div>

      <!-- Login form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email"    id="login-email"    placeholder="your@email.com"  required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••"        required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit">Login</button>
        <p class="auth-error" id="login-error" role="alert"></p>
      </form>

      <!-- Sign-up form (hidden by default) -->
      <form id="signup-form" style="display:none">
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email"    id="signup-email"    placeholder="your@email.com"    required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters"  required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm"  placeholder="Repeat password"   required autocomplete="new-password">
        </div>
        <button type="submit" class="auth-submit">Create Account</button>
        <p class="auth-error" id="signup-error" role="alert"></p>
      </form>

    </div>
  </div>

  <script type="module">
    import { auth }            from './js/firebase-config.js';
    import { login, signup, initNav } from './js/auth.js';
    import { onAuthStateChanged }     from
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    initNav();

    // Redirect already-logged-in users
    onAuthStateChanged(auth, (user) => {
      if (!user) return;
      const p = new URLSearchParams(window.location.search);
      window.location.href = p.get('redirect') === 'cart' ? 'cart.html' : 'shop.html';
    });

    // Open correct tab via ?tab=signup
    if (new URLSearchParams(window.location.search).get('tab') === 'signup') showSignup();

    // ── Tab logic ─────────────────────────────────────────────────────
    document.getElementById('tab-login').addEventListener('click',  showLogin);
    document.getElementById('tab-signup').addEventListener('click', showSignup);

    function showLogin() {
      toggle('tab-login',   'tab-signup');
      toggle('login-form',  'signup-form');
    }
    function showSignup() {
      toggle('tab-signup',  'tab-login');
      toggle('signup-form', 'login-form');
    }
    function toggle(showId, hideId) {
      document.getElementById(showId).style.display  = '';
      document.getElementById(hideId).style.display  = 'none';
      document.getElementById(showId).classList.add('active');
      document.getElementById(hideId).classList.remove('active');
    }

    // ── Login submit ──────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      try {
        await login(
          document.getElementById('login-email').value,
          document.getElementById('login-password').value
        );
        // onAuthStateChanged redirect fires automatically
      } catch (err) {
        errEl.textContent = friendlyError(err.code);
      }
    });

    // ── Sign-up submit ────────────────────────────────────────────────
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl    = document.getElementById('signup-error');
      const password = document.getElementById('signup-password').value;
      const confirm  = document.getElementById('signup-confirm').value;
      errEl.textContent = '';

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        return;
      }
      try {
        await signup(
          document.getElementById('signup-email').value,
          password
        );
        // onAuthStateChanged redirect fires automatically
      } catch (err) {
        errEl.textContent = friendlyError(err.code);
      }
    });

    // ── Error messages ────────────────────────────────────────────────
    function friendlyError(code) {
      return {
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/wrong-password':       'Incorrect password. Please try again.',
        'auth/user-not-found':       'No account found with this email.',
        'auth/invalid-credential':   'Invalid email or password.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/too-many-requests':    'Too many attempts. Please wait and try again.'
      }[code] || 'Something went wrong. Please try again.';
    }
  </script>

</body>
</html>
