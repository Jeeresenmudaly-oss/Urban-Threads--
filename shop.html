<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Urban Threads</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >
</head>
<body>

  <!-- ── Navbar ───────────────────────────────────────────────────────── -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Urban<span>Threads</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li>
          <a href="cart.html" class="nav-cart-link">
            Cart <span class="cart-badge" id="cart-count" aria-label="Cart items" style="display:none">0</span>
          </a>
        </li>
      </ul>
      <div class="nav-auth">
        <span id="user-display"></span>
        <a href="login.html" class="btn btn-outline" id="login-nav-btn">Login</a>
        <button class="btn btn-ghost" id="logout-btn" style="display:none">Logout</button>
      </div>
    </div>
  </nav>

  <!-- ── Shop header + filters ─────────────────────────────────────────── -->
  <div class="shop-header">
    <div class="shop-header-inner">
      <h1 class="shop-title">The Collection</h1>
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-category="">All</button>
        <button class="filter-tab" data-category="Hoodies">Hoodies</button>
        <button class="filter-tab" data-category="T-Shirts">T-Shirts</button>
        <button class="filter-tab" data-category="Sneakers">Sneakers</button>
        <button class="filter-tab" data-category="Accessories">Accessories</button>
      </div>
    </div>
  </div>

  <!-- ── Product grid ───────────────────────────────────────────────────── -->
  <main class="shop-main">
    <div class="products-grid" id="products-grid">
      <p class="loading">Loading products…</p>
    </div>
  </main>

  <!-- ── Fullscreen product modal ────────────────────────────────────────── -->
  <div class="product-modal" id="product-modal" aria-hidden="true">
    <div class="product-modal-backdrop" data-modal-close></div>
    <div class="product-modal-sheet" role="dialog" aria-modal="true" aria-label="Product details">
      <button class="product-modal-back" type="button" aria-label="Back" data-modal-close>
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
          <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="product-modal-body" id="product-modal-body"></div>
    </div>
  </div>

  <!-- ── Footer ────────────────────────────────────────────────────────── -->
  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-logo">Urban<span>Threads</span></div>
        <p>Streetwear for the bold generation.</p>
      </div>
      <div class="footer-col">
        <h4>Shop</h4>
        <ul>
          <li><a href="shop.html?category=Hoodies">Hoodies</a></li>
          <li><a href="shop.html?category=T-Shirts">T-Shirts</a></li>
          <li><a href="shop.html?category=Sneakers">Sneakers</a></li>
          <li><a href="shop.html?category=Accessories">Accessories</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>Account</h4>
        <ul>
          <li><a href="login.html">Sign In</a></li>
          <li><a href="cart.html">My Cart</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2025 Urban Threads. All rights reserved.</span>
    </div>
  </footer>

  <script type="module">
    import { initNav }                      from './js/auth.js';
    import { fetchProducts, renderProducts } from './js/shop.js';
    import { seedProducts }                 from './js/seed.js';

    initNav();

    let activeCategory = '';

    async function loadProducts(category) {
      document.getElementById('products-grid').innerHTML =
        '<p class="loading">Loading products…</p>';
      try {
        await seedProducts();
      } catch (_) { /* seed failure is non-fatal */ }
      const products = await fetchProducts(category || null);
      renderProducts(products, 'products-grid');
    }

    // Pre-select tab from URL ?category=
    const params = new URLSearchParams(window.location.search);
    const urlCat = params.get('category') || '';
    if (urlCat) {
      activeCategory = urlCat;
      document.querySelectorAll('.filter-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.category === urlCat)
      );
    }

    loadProducts(activeCategory);

    // Filter tab clicks
    document.getElementById('filter-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeCategory = tab.dataset.category;
      loadProducts(activeCategory);
    });
  </script>

</body>
</html>
